<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GREECE • 8</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');

    body { font-family: 'Inter', system_ui, sans-serif; }
    .font-display { font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif; font-weight: 600; }

    .big-timer {
      font-size: 66px; line-height: 1; font-weight: 800;
      font-family: 'Space Grotesk', ui-monospace, monospace;
      letter-spacing: -4px;
    }

    .day-card { transition: transform 0.15s cubic-bezier(0.4,0,0.2,1); }
    .day-card:active { transform: scale(0.985); }

    .exercise-row:active { background-color: #334155; }
    .exercise-desc { max-height: 0; overflow: hidden; transition: max-height .25s ease; }
    .exercise-desc.open { max-height: 220px; }

    .timer-btn { transition: transform .08s ease; touch-action: manipulation; }
    .timer-btn:active { transform: scale(0.96); }

    .wod-badge { font-size: 10px; padding: 1px 8px; border-radius: 9999px; font-weight: 700; letter-spacing: .5px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen pb-12">

  <!-- HEADER -->
  <div class="sticky top-0 z-50 bg-slate-950/95 backdrop-blur-xl border-b border-slate-800">
    <div class="max-w-screen-md mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <div class="flex items-center gap-x-3">
          <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-sky-500 to-sky-600 flex items-center justify-center">
            <span class="text-white font-bold text-2xl tracking-tighter">G8</span>
          </div>
          <div>
            <div class="font-display text-2xl tracking-tighter font-semibold">GREECE<span class="text-sky-400">8</span></div>
            <div class="text-[10px] text-slate-500 -mt-1">CASALINGO • VACANZIERO</div>
          </div>
        </div>
        <button onclick="showProgress()" class="flex items-center gap-x-1.5 px-3 py-1.5 text-xs rounded-2xl bg-slate-900 border border-slate-700">
          <span>📊</span> <span class="font-medium">Progresso</span>
        </button>
      </div>
    </div>
  </div>

  <!-- HERO -->
  <div class="max-w-screen-md mx-auto px-4 pt-6 pb-2 text-center">
    <div class="inline-flex items-center gap-x-2 px-3 py-1 rounded-full bg-slate-900 border border-slate-800 text-xs tracking-widest mb-3">
      <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></div>
      8 SESSIONI • 30-40 MIN
    </div>
    <h1 class="font-display text-4xl tracking-tighter font-semibold">Allenati ovunque.</h1>
    <p class="text-slate-400 mt-1.5 text-[15px]">Corpo libero. Senza scuse. Anche in vacanza.</p>
  </div>

  <!-- DAYS -->
  <div class="max-w-screen-md mx-auto px-4 pt-5">
    <div class="grid grid-cols-2 gap-3" id="days-grid"></div>
  </div>

  <div class="max-w-screen-md mx-auto px-4 pt-8 text-center text-[11px] text-slate-500">
    Tocca un giorno → gli esercizi hanno le descrizioni.<br>
    I timer partono dopo il 3-2-1 (su iOS tocca il pulsante grande).
  </div>

  <!-- DETAIL -->
  <div id="detail-view" class="hidden fixed inset-0 z-60 bg-slate-950">
    <div class="max-w-screen-md mx-auto h-full flex flex-col">
      <div class="sticky top-0 bg-slate-950/95 backdrop-blur border-b border-slate-800 px-4 h-14 flex items-center justify-between">
        <button onclick="closeDetail()" class="text-sky-400 flex items-center gap-1 text-sm font-medium">← Indietro</button>
        <div id="detail-header" class="font-semibold"></div>
        <div class="w-9"></div>
      </div>
      <div class="flex-1 overflow-auto px-4 pt-3 pb-20" id="detail-content"></div>
    </div>
  </div>

  <!-- TIMER -->
  <div id="timer-overlay" class="hidden fixed inset-0 z-70 bg-slate-950/95 backdrop-blur flex items-center justify-center p-4">
    <div class="w-full max-w-[420px]">
      <div class="flex justify-between items-center mb-3 px-1">
        <div id="timer-title" class="font-semibold text-xl text-sky-300"></div>
        <button onclick="closeTimer()" class="px-3 py-1 text-sm rounded-xl bg-slate-900 border border-slate-700">CHIUDI</button>
      </div>

      <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6">
        <div class="flex justify-center">
          <div id="timer-display" class="big-timer tabular-nums text-center">20:00</div>
        </div>
        <div id="timer-phase" class="mt-1 text-center text-2xl font-semibold text-sky-400 min-h-8"></div>
        <div id="timer-sub" class="text-center text-sm text-slate-400"></div>

        <!-- AMRAP counters -->
        <div id="timer-counters" class="hidden mt-6">
          <div class="flex justify-center gap-8 text-center">
            <div><div class="text-[10px] text-slate-500">ROUND</div><div id="rounds-current" class="text-6xl font-bold">1</div></div>
            <div><div class="text-[10px] text-slate-500">COMPLETATI</div><div id="rounds-done" class="text-6xl font-bold text-emerald-400">0</div></div>
          </div>
        </div>

        <!-- EMOM current -->
        <div id="emom-info" class="hidden mt-5">
          <div class="bg-slate-950 border border-slate-700 rounded-2xl p-4">
            <div class="text-xs text-center text-slate-400">QUESTO MINUTO</div>
            <div id="emom-current-ex" class="text-2xl font-bold text-center"></div>
            <div id="emom-reps" class="text-center text-sky-400 font-semibold"></div>
          </div>
        </div>

        <div id="timer-actions" class="mt-7 space-y-2"></div>
        <div id="prestart-note" class="hidden text-center text-amber-400 text-xs mt-4 font-medium">⏱ 3-2-1...</div>
      </div>
      <div id="timer-help" class="text-center text-xs text-slate-500 mt-4"></div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-800 border border-slate-700 px-4 py-2 rounded-2xl text-sm"></div>

  <script>
    // Tailwind
    function initTailwind() {
      const style = document.createElement('style');
      style.innerHTML = '.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }';
      document.head.appendChild(style);
    }

    // ==================== DATA ====================
    const workouts = [ /* same data as before - kept for brevity in this response, but identical */ 
      {id:1, titolo:"GIORNO 1", durata:"30-35 min", focus:"Gambe + Core", note:"EMOM + rounds di plank e mobilità spalle.",
       protocolli:[
         {id:"d1-emom", tipo:"emom", label:"EMOM 20'", durataMin:20,
          esercizi:[{nome:"Squat",qty:"20",desc:"Piedi larghezza spalle. Scendi con anche indietro, ginocchia in fuori, petto alto."},{nome:"Sit up",qty:"15",desc:"Sdraiato, solleva busto con addominali fino a seduto controllando la discesa."}],
          note:"Completa A e B entro il minuto."},
         {id:"d1-rounds", tipo:"rounds", label:"4 Rounds", rounds:4,
          items:[{nome:"Plank a braccia tese",tempo:"30\"",desc:"Corpo dritto, core contratto."},{nome:"Circonduzioni spalle",tempo:"1'",desc:"Piccoli cerchi con le braccia parallele al pavimento."}], restSec:60}
       ]},
      {id:2, titolo:"GIORNO 2", durata:"40 min", focus:"Resistenza", note:"AMRAP 40'",
       protocolli:[{id:"d2-amrap", tipo:"amrap", label:"AMRAP 40'", durataMin:40,
         esercizi:[{nome:"Corsa",qty:"2'",desc:"Zona 2, ritmo conversazionale."},{nome:"Ab Walk",qty:"15",desc:"Inchworm fino a plank e ritorno."},{nome:"Good morning",qty:"30",desc:"Hip hinge con schiena dritta."}]}]},
      {id:3, titolo:"GIORNO 3", durata:"30-35 min", focus:"Push + Core", note:"EMOM + 4 rounds",
       protocolli:[
         {id:"d3-emom", tipo:"emom", label:"EMOM 20'", durataMin:20, esercizi:[{nome:"Push up",qty:"10-20",desc:"Flessioni."},{nome:"Affondi alternati",qty:"20",desc:"Affondi camminati."}]},
         {id:"d3-rounds", tipo:"rounds", label:"4 Rounds", rounds:4, items:[{nome:"Crunch",tempo:"30",desc:"Crunch classici."},{nome:"Side plank dinamici",tempo:"15/side",desc:"Hip dip o thread the needle."}], restSec:45}
       ]},
      {id:4, titolo:"GIORNO 4", durata:"25-30 min", focus:"Pliometria", note:"Salti + rounds",
       protocolli:[
         {id:"d4-jumps", tipo:"simple", label:"20X Salti mono", esercizi:[{nome:"Salto 1 piede → atterra 2",qty:"20",desc:"10 per gamba, atterra su due piedi."}]},
         {id:"d4-rounds", tipo:"rounds", label:"4 Rounds", rounds:4, items:[{nome:"Plank shoulder tap",tempo:"20",desc:"Tocca spalle alternando."},{nome:"Glute bridge",tempo:"20",desc:"Ponte glutei."},{nome:"Reverse crunch",tempo:"20",desc:"Crunch inverso."}], restSec:60}
       ]},
      {id:5, titolo:"GIORNO 5", durata:"30 min", focus:"Cardio", note:"EMOM + 3 rounds duri",
       protocolli:[
         {id:"d5-emom", tipo:"emom", label:"EMOM 20'", durataMin:20, esercizi:[{nome:"Wall sit",tempo:"30\"",desc:"Squat contro muro."},{nome:"Flutter kicks",tempo:"30\"",desc:"Calci alternati bassi."}]},
         {id:"d5-rounds", tipo:"rounds", label:"3 Rounds", rounds:3, items:[{nome:"Burpees over line",qty:"30",desc:"Burpee + salto laterale."},{nome:"Affondi saltati",qty:"30",desc:"Jumping lunges."}], restSec:90}
       ]},
      {id:6, titolo:"GIORNO 6", durata:"30-35 min", focus:"Spalle + Core", note:"Con manico di scopa",
       protocolli:[
         {id:"d6-shoulders", tipo:"rounds", label:"5 Rounds", rounds:5, items:[{nome:"Shoulder press",qty:"20",desc:"Con bastone."},{nome:"Alzate frontali",qty:"20",desc:"Front raise."}], restSec:60},
         {id:"d6-core", tipo:"rounds", label:"2 Rounds", rounds:2, items:[{nome:"V-up",qty:"50",desc:"V-up."},{nome:"Squat saltati",qty:"50",desc:"Jump squat."}], restSec:90}
       ]},
      {id:7, titolo:"GIORNO 7", durata:"32 min", focus:"Velocità", note:"10 intervalli",
       protocolli:[
         {id:"d7-warmup", tipo:"text", label:"Warm-up", items:[{nome:"Camminata varia",qty:"8-10 min",desc:"Punta, talloni, dentro, fuori + corsa blanda."}]},
         {id:"d7-intervals", tipo:"intervals", label:"10 Rounds", rounds:10, workSec:20, restSec:120, esercizi:[{nome:"Corsa velocissima",desc:"Fast feet 20\"."}]}
       ]},
      {id:8, titolo:"GIORNO 8", durata:"~35 min", focus:"For Time", note:"100-150-200",
       protocolli:[
         {id:"d8-fortime", tipo:"fortime", label:"FOR TIME", esercizi:[{nome:"Sit up",qty:"100",desc:""},{nome:"Push up",qty:"150",desc:""},{nome:"Mezzi squat",qty:"200",desc:""}]},
         {id:"d8-cooldown", tipo:"text", label:"Cool down", items:[{nome:"Camminata",qty:"10 min",desc:"Scioglimento."}]}
       ]}
    ]

    // STATE
    let currentDetailDay = null
    let timerState = {}
    let audioCtx = null

    // UTILS
    function showToast(msg, ms=2200) {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.classList.remove('hidden')
      setTimeout(() => t.classList.add('hidden'), ms)
    }

    function getCompletedDays() {
      try { return JSON.parse(localStorage.getItem('greece8_completed')||'{}') } catch {return {}}
    }
    function markDayComplete(id) {
      const d = getCompletedDays(); d[id] = new Date().toISOString().slice(0,10)
      localStorage.setItem('greece8_completed', JSON.stringify(d))
    }
    function isDayComplete(id) { return !!getCompletedDays()[id] }

    // AUDIO - iOS safe
    function initAudio() {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)()
        } catch(e){}
      }
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().catch(()=>{})
      }
      return audioCtx
    }

    function beep(freq=880, dur=140, type='sine', vol=0.7) {
      const ctx = initAudio()
      if (!ctx) return
      if (ctx.state === 'suspended') ctx.resume()
      const osc = ctx.createOscillator()
      const g = ctx.createGain()
      const f = ctx.createBiquadFilter()
      osc.type = type; osc.frequency.value = freq
      f.type='lowpass'; f.frequency.value=2400
      g.gain.value = vol
      const t = ctx.currentTime
      osc.connect(f); f.connect(g); g.connect(ctx.destination)
      osc.start(t)
      g.gain.setValueAtTime(vol, t)
      g.gain.linearRampToValueAtTime(0.0001, t + dur/1000)
      osc.stop(t + dur/1000 + 0.08)
    }

    function vibrate(ms=25){ if(navigator.vibrate) navigator.vibrate(ms) }

    function playPrestart() {
      const ctx = initAudio()
      if (ctx && ctx.state === 'suspended') ctx.resume()
      return new Promise(r => {
        vibrate(20); beep(620,180,'sine',0.6)
        setTimeout(()=>{ vibrate(20); beep(780,180,'sine',0.65)
          setTimeout(()=>{ vibrate(20); beep(940,180,'sine',0.7)
            setTimeout(()=>{ vibrate(40); beep(1240,420,'sine',0.85); setTimeout(r,280) },780)
          },780)
        },780)
      })
    }

    function playMinuteBeep(){vibrate(15);beep(980,90,'square',0.6);setTimeout(()=>beep(1240,60,'sine',0.5),110)}
    function playRoundComplete(){vibrate([20,30,60]);beep(760,110,'sine',0.6);setTimeout(()=>beep(980,110,'sine',0.65),130);setTimeout(()=>beep(1240,200,'sine',0.7),280)}
    function playWarning(){vibrate(30);beep(650,70,'sawtooth',0.5);setTimeout(()=>beep(650,70,'sawtooth',0.5),160)}
    function playFinish(){vibrate([40,40,120]);for(let i=0;i<3;i++)setTimeout(()=>beep(1100+i*90,160,'sine',0.7),i*180)}

    // RENDER DAYS
    function renderDays(){
      const c = document.getElementById('days-grid')
      c.innerHTML = ''
      const done = getCompletedDays()
      workouts.forEach(w => {
        const doneBadge = done[w.id] ? `<div class="text-emerald-400 text-xl">✓</div>` : ''
        let badges = ''
        w.protocolli.forEach(p=>{
          if(p.tipo==='emom') badges += `<span class="wod-badge bg-amber-900 text-amber-300">EMOM</span>`
          else if(p.tipo==='amrap') badges += `<span class="wod-badge bg-violet-900 text-violet-300">AMRAP</span>`
          else if(p.tipo==='fortime') badges += `<span class="wod-badge bg-rose-900 text-rose-300">FOR TIME</span>`
          else if(p.tipo==='intervals') badges += `<span class="wod-badge bg-cyan-900 text-cyan-300">INTERVAL</span>`
          else badges += `<span class="wod-badge bg-slate-700 text-slate-300">ROUNDS</span>`
        })
        const card = document.createElement('div')
        card.className = `day-card bg-slate-900 border ${done[w.id]?'border-emerald-600/70':'border-slate-700'} rounded-3xl p-4 cursor-pointer`
        card.innerHTML = `
          <div class="flex justify-between">
            <div>
              <div class="font-display text-2xl font-semibold tracking-tighter">${w.titolo}</div>
              <div class="text-xs text-slate-400">${w.durata}</div>
            </div>
            ${doneBadge}
          </div>
          <div class="mt-5">
            <div class="text-sm font-semibold text-sky-300">${w.focus}</div>
            <div class="text-[11px] text-slate-400 mt-0.5">${w.note}</div>
          </div>
          <div class="mt-3 pt-3 border-t border-slate-700 flex justify-between items-center">
            <div class="flex gap-1">${badges}</div>
            <div class="text-xs text-sky-400 font-medium">APRI →</div>
          </div>`
        card.onclick = () => openDetail(w.id)
        c.appendChild(card)
      })
    }

    function openDetail(id){
      const w = workouts.find(x=>x.id===id)
      currentDetailDay = id
      document.getElementById('detail-header').innerHTML = `${w.titolo} <span class="text-xs text-slate-400">${w.durata}</span>`

      let html = `<div class="mb-3"><div class="text-sky-300 font-medium">${w.focus}</div><div class="text-slate-400 text-sm">${w.note}</div></div>`

      w.protocolli.forEach(p => {
        html += `<div class="mt-4 bg-slate-900 border border-slate-700 rounded-3xl p-4">`
        html += `<div class="flex justify-between items-center mb-3">
          <span class="text-xs px-2.5 py-0.5 rounded bg-slate-800">${p.label}</span>`
        if (['emom','amrap','fortime','intervals','rounds'].includes(p.tipo)) {
          html += `<button onclick="launchTimer(${w.id},'${p.id}',event)" class="px-4 py-1 text-xs font-semibold rounded-2xl bg-sky-500 text-black">AVVIA TIMER</button>`
        } else if (p.tipo === 'simple') {
          html += `<button onclick="launchSimpleTimer(${w.id},'${p.id}',event)" class="px-4 py-1 text-xs font-semibold rounded-2xl bg-sky-500 text-black">AVVIA</button>`
        }
        html += `</div>`

        const items = p.esercizi || p.items || []
        items.forEach(ex => {
          const q = ex.qty || ex.tempo || ''
          html += `<div class="flex gap-3 px-1 py-2 border-b border-slate-700 last:border-0" onclick="this.querySelector('.desc').classList.toggle('open')">
            <div class="w-9 text-right text-sky-400 font-mono text-sm">${q}</div>
            <div class="flex-1">
              <div class="font-medium">${ex.nome}</div>
              <div class="desc text-sm text-slate-400 hidden">${ex.desc}</div>
            </div>
          </div>`
        })
        if (p.note) html += `<div class="text-xs text-slate-400 mt-3">${p.note}</div>`
        html += `</div>`
      })

      const done = isDayComplete(id)
      html += `<button onclick="completeCurrentDay()" class="mt-6 w-full py-3.5 rounded-2xl font-semibold text-sm ${done ? 'bg-emerald-600/20 text-emerald-300 border border-emerald-700' : 'bg-gradient-to-r from-sky-500 to-sky-600 text-white'}">
        ${done ? '✓ GIORNATA COMPLETATA' : 'SEGNA COME COMPLETATA'}
      </button>`

      document.getElementById('detail-content').innerHTML = html
      document.getElementById('detail-view').classList.remove('hidden')
      document.getElementById('detail-view').classList.add('flex','flex-col')
    }

    function closeDetail(){
      const v = document.getElementById('detail-view')
      v.classList.remove('flex','flex-col')
      v.classList.add('hidden')
      renderDays()
    }
    function completeCurrentDay(){
      if(!currentDetailDay) return
      markDayComplete(currentDetailDay)
      showToast('Completata!')
      openDetail(currentDetailDay)
      renderDays()
    }

    function toggleDesc(el){ el.classList.toggle('open') }

    // ==================== FULL TIMER ENGINE ====================
    let timerInterval = null

    function launchTimer(dayId, protoId, ev){
      ev.stopImmediatePropagation()
      const w = workouts.find(x=>x.id===dayId)
      const p = w.protocolli.find(x=>x.id===protoId)
      if(!p) return

      const overlay = document.getElementById('timer-overlay')
      overlay.classList.remove('hidden')
      overlay.classList.add('flex')
      document.getElementById('timer-title').textContent = p.label

      timerState = {type: p.tipo, proto: p, isRunning: false}

      document.getElementById('timer-counters').classList.add('hidden')
      document.getElementById('emom-info').classList.add('hidden')
      document.getElementById('prestart-note').classList.add('hidden')

      if(p.tipo === 'emom') renderEMOM(p)
      else if(p.tipo === 'amrap') renderAMRAP(p)
      else if(p.tipo === 'fortime') renderForTime(p)
      else if(p.tipo === 'intervals') renderIntervals(p)
      else if(p.tipo === 'rounds') renderRounds(p)
    }

    function renderEMOM(p){
      document.getElementById('timer-display').textContent = String(p.durataMin).padStart(2,'0') + ':00'
      document.getElementById('timer-phase').textContent = 'EMOM'
      document.getElementById('emom-info').classList.remove('hidden')
      document.getElementById('timer-actions').innerHTML = `
        <button onclick="startEMOM()" class="timer-btn w-full py-4 text-lg font-bold rounded-2xl bg-emerald-500 text-black">INIZIA — 3-2-1</button>
        <button onclick="pauseResumeTimer()" class="timer-btn w-full py-3 text-sm rounded-2xl bg-slate-800 border border-slate-600">PAUSA / RIPRENDI</button>
        <button onclick="endTimer()" class="timer-btn w-full py-3 text-sm rounded-2xl bg-slate-900 border border-slate-700">TERMINA</button>`
    }

    function startEMOM(){
      const p = timerState.proto
      timerState.startTime = Date.now()
      timerState.emomMinute = 0
      timerState.isRunning = true
      document.getElementById('prestart-note').classList.remove('hidden')
      playPrestart().then(() => {
        document.getElementById('prestart-note').classList.add('hidden')
        updateEMOM()
        timerInterval = setInterval(updateEMOM, 250)
      })
    }

    function updateEMOM(){
      if(!timerState.isRunning) return
      const p = timerState.proto
      const elapsed = Date.now() - timerState.startTime
      const min = Math.floor(elapsed / 60000)
      const secLeft = 60 - (Math.floor(elapsed/1000) % 60)
      const totalLeft = Math.max(0, p.durataMin*60 - Math.floor(elapsed/1000))
      const m = Math.floor(totalLeft/60)
      const s = totalLeft % 60
      document.getElementById('timer-display').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`

      if (min !== timerState.emomMinute && min < p.durataMin) {
        timerState.emomMinute = min
        playMinuteBeep()
      }
      const ex = p.esercizi[min % 2]
      document.getElementById('emom-current-ex').textContent = ex.nome
      document.getElementById('emom-reps').textContent = ex.qty + ' reps'
      document.getElementById('timer-phase').innerHTML = `MINUTO ${min+1} / ${p.durataMin}`

      if (min >= p.durataMin) {
        clearInterval(timerInterval)
        playFinish()
        document.getElementById('timer-phase').innerHTML = `<span class="text-emerald-400">COMPLETATO</span>`
        document.getElementById('timer-actions').innerHTML = `<button onclick="endTimer()" class="timer-btn w-full py-4 text-lg font-bold rounded-2xl bg-emerald-500 text-black">CHIUDI</button>`
      }
    }

    // AMRAP
    function renderAMRAP(p){
      document.getElementById('timer-display').textContent = String(p.durataMin).padStart(2,'0')+':00'
      document.getElementById('timer-phase').textContent = 'AMRAP'
      document.getElementById('timer-counters').classList.remove('hidden')
      document.getElementById('rounds-current').textContent = '1'
      document.getElementById('rounds-done').textContent = '0'
      document.getElementById('timer-actions').innerHTML = `
        <button onclick="startAMRAP()" class="timer-btn w-full py-4 text-lg font-bold rounded-2xl bg-violet-500 text-black">INIZIA — 3-2-1</button>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="amrapAddRound()" class="timer-btn py-3 text-sm font-semibold rounded-2xl bg-emerald-900/60 border border-emerald-700">+1 ROUND</button>
          <button onclick="pauseResumeTimer()" class="timer-btn py-3 text-sm rounded-2xl bg-slate-800 border border-slate-600">PAUSA</button>
        </div>
        <button onclick="endTimer()" class="timer-btn w-full py-3 text-sm rounded-2xl bg-slate-900 border border-slate-700">TERMINA</button>`
    }
    function startAMRAP(){
      const p = timerState.proto
      timerState.startTime = Date.now()
      timerState.rounds = 0
      timerState.isRunning = true
      document.getElementById('prestart-note').classList.remove('hidden')
      playPrestart().then(()=>{
        document.getElementById('prestart-note').classList.add('hidden')
        timerInterval = setInterval(()=>{
          if(!timerState.isRunning) return
          const left = Math.max(0, p.durataMin*60 - Math.floor((Date.now()-timerState.startTime)/1000))
          const m = Math.floor(left/60), s = left%60
          document.getElementById('timer-display').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
          if(left <= 0){ clearInterval(timerInterval); playFinish() }
        }, 300)
      })
    }
    function amrapAddRound(){
      timerState.rounds = (timerState.rounds||0) + 1
      document.getElementById('rounds-done').textContent = timerState.rounds
      document.getElementById('rounds-current').textContent = timerState.rounds + 1
    }

    // FOR TIME
    function renderForTime(p){
      document.getElementById('timer-display').textContent = '00:00'
      document.getElementById('timer-phase').textContent = 'FOR TIME'
      document.getElementById('timer-actions').innerHTML = `
        <button onclick="startForTime()" class="timer-btn w-full py-4 text-lg font-bold rounded-2xl bg-rose-500 text-white">INIZIA CRONOMETRO</button>
        <button onclick="pauseResumeTimer()" class="timer-btn w-full py-3 text-sm rounded-2xl bg-slate-800 border border-slate-600">PAUSA</button>
        <button onclick="finishForTime()" class="timer-btn w-full py-3 text-sm font-bold rounded-2xl bg-emerald-600">HO FINITO!</button>`
    }
    function startForTime(){
      timerState.start = Date.now()
      timerState.isRunning = true
      timerInterval = setInterval(()=>{
        if(!timerState.isRunning) return
        const sec = Math.floor((Date.now()-timerState.start)/1000)
        document.getElementById('timer-display').textContent = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`
      },250)
    }
    function finishForTime(){
      clearInterval(timerInterval)
      playFinish()
      document.getElementById('timer-phase').innerHTML = `<span class="text-emerald-400">TEMPO FINALE</span>`
      document.getElementById('timer-actions').innerHTML = `<button onclick="endTimer()" class="timer-btn w-full py-4 text-lg font-bold rounded-2xl bg-emerald-500 text-black">CHIUDI</button>`
    }

    // INTERVALS
    function renderIntervals(p){
      document.getElementById('timer-display').textContent = '20'
      document.getElementById('timer-phase').textContent = `ROUND 1 / ${p.rounds}`
      document.getElementById('timer-actions').innerHTML = `
        <button onclick="startIntervals()" class="timer-btn w-full py-4 text-lg font-bold rounded-2xl bg-cyan-500 text-black">INIZIA 1° INTERVALLO</button>
        <button onclick="pauseResumeTimer()" class="timer-btn w-full py-3 text-sm rounded-2xl bg-slate-800 border border-slate-600">PAUSA</button>`
      timerState.currentRound = 1
      timerState.phase = 'work'
    }
    function startIntervals(){
      timerState.isRunning = true
      playPrestart().then(()=> runIntervalPhase())
    }
    function runIntervalPhase(){
      const p = timerState.proto
      const dur = timerState.phase === 'work' ? p.workSec : p.restSec
      let start = Date.now()
      document.getElementById('timer-phase').textContent = timerState.phase === 'work' ? `ROUND ${timerState.currentRound} — LAVORO` : 'RECUPERO'
      timerInterval = setInterval(()=>{
        if(!timerState.isRunning) return
        const rem = Math.max(0, dur - Math.floor((Date.now()-start)/1000))
        document.getElementById('timer-display').textContent = String(rem)
        if(rem <= 0){
          clearInterval(timerInterval)
          if(timerState.phase === 'work'){
            timerState.phase = 'rest'
            playRoundComplete()
            runIntervalPhase()
          } else {
            if(timerState.currentRound >= p.rounds){
              playFinish()
              document.getElementById('timer-actions').innerHTML = `<button onclick="endTimer()" class="timer-btn w-full py-4 text-lg font-bold rounded-2xl bg-emerald-500 text-black">CHIUDI</button>`
            } else {
              timerState.currentRound++
              timerState.phase = 'work'
              playMinuteBeep()
              runIntervalPhase()
            }
          }
        }
      }, 200)
    }

    // ROUNDS (simplified but working)
    function renderRounds(p){
      document.getElementById('timer-display').textContent = '--'
      document.getElementById('timer-phase').textContent = `ROUND 1 / ${p.rounds}`
      timerState.current = 1
      document.getElementById('timer-actions').innerHTML = `<button onclick="startRounds()" class="timer-btn w-full py-4 text-lg font-bold rounded-2xl bg-sky-500 text-black">INIZIA ROUND 1</button>`
    }
    function startRounds(){ timerState.isRunning = true; playPrestart().then(()=> nextRoundExercise()) }

    function nextRoundExercise(){
      // Simplified version for stability - user can advance manually
      const p = timerState.proto
      document.getElementById('timer-phase').textContent = `ROUND ${timerState.current} / ${p.rounds} — ${p.items[0].nome}`
      document.getElementById('timer-display').textContent = p.items[0].tempo || '30'
      document.getElementById('timer-actions').innerHTML = `
        <button onclick="nextRoundExercise()" class="timer-btn w-full py-4 text-lg font-bold rounded-2xl bg-sky-500 text-black">PROSSIMO ESERCIZIO / ROUND</button>
        <button onclick="endTimer()" class="timer-btn w-full py-3 text-sm rounded-2xl bg-slate-900 border border-slate-700">TERMINA</button>`
    }

    // SIMPLE
    function launchSimpleTimer(dayId, protoId, ev){
      ev.stopImmediatePropagation()
      const overlay = document.getElementById('timer-overlay')
      overlay.classList.remove('hidden'); overlay.classList.add('flex')
      document.getElementById('timer-title').textContent = '20X Salti'
      document.getElementById('timer-display').textContent = '20'
      timerState = {type:'simple', count:0}
      document.getElementById('timer-actions').innerHTML = `
        <div class="text-center"><div id="simple-counter" class="text-7xl font-bold">0</div></div>
        <button onclick="simpleDoOne()" class="timer-btn w-full py-4 text-lg font-bold rounded-2xl bg-amber-500 text-black">+1 SALTO</button>
        <button onclick="endTimer()" class="timer-btn w-full py-3 text-sm rounded-2xl bg-slate-900 border border-slate-700">CHIUDI</button>`
    }
    function simpleDoOne(){
      timerState.count++
      document.getElementById('simple-counter').textContent = timerState.count
      if(timerState.count >= 20) playFinish()
    }

    function pauseResumeTimer(){ if(timerState) timerState.isRunning = !timerState.isRunning }
    function endTimer(){
      if(timerInterval) clearInterval(timerInterval)
      const o = document.getElementById('timer-overlay')
      o.classList.remove('flex')
      o.classList.add('hidden')
      timerState = null
    }
    function closeTimer(){ endTimer() }

    function showProgress(){
      const done = getCompletedDays()
      let html = `<div class="max-w-screen-md mx-auto p-4"><div class="text-2xl font-semibold mb-4">Progresso</div>`
      workouts.forEach(w=>{
        html += `<div class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-3 mb-2 flex justify-between"><div>${w.titolo} — ${w.focus}</div><div class="text-xs ${done[w.id]?'text-emerald-400':'text-slate-500'}">${done[w.id]||'—'}</div></div>`
      })
      html += `<button onclick="document.getElementById('progress-modal').remove()" class="mt-4 w-full py-3 bg-slate-800 rounded-2xl">CHIUDI</button></div>`
      const m = document.createElement('div')
      m.id='progress-modal'
      m.className = 'fixed inset-0 z-80 bg-slate-950/95 flex items-center justify-center p-4'
      m.innerHTML = html
      document.body.appendChild(m)
    }

    function init(){
      initTailwind()
      renderDays()
      if('serviceWorker' in navigator){
        navigator.serviceWorker.register('./sw.js').catch(()=>{})
      }
      document.body.addEventListener('touchstart', () => {
        initAudio()
      }, {once:true})
    }
    window.onload = init
  </script>
</body>
</html>
